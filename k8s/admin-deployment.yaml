apiVersion: apps/v1
kind: Deployment
metadata:
  name: offis-admin
  namespace: offisdesign
spec:
  replicas: 1
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 1, maxUnavailable: 0 } }
  selector:
    matchLabels: { app: offis-admin }
  template:
    metadata:
      labels: { app: offis-admin }
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: admin
          image: ghcr.io/offisdesign/admin:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3001, name: http }]
          env:
            - { name: NEXT_PUBLIC_API_URL, value: 'https://api.offisdesign.com' }
          startupProbe:
            httpGet: { path: '/login', port: http }
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe: { httpGet: { path: '/login', port: http }, periodSeconds: 15 }
          readinessProbe: { httpGet: { path: '/login', port: http }, periodSeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: offis-admin
  namespace: offisdesign
spec:
  selector: { app: offis-admin }
  ports: [{ port: 80, targetPort: 3001 }]
