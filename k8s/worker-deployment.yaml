apiVersion: apps/v1
kind: Deployment
metadata:
  name: offis-worker
  namespace: offisdesign
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: offis-worker
  template:
    metadata:
      labels:
        app: offis-worker
    spec:
      # Workers need more grace than the API — an in-flight job can take
      # tens of seconds (image resize, large fan-out email). Bump if your
      # heaviest job exceeds this window.
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: ghcr.io/offisdesign/worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: offis-secrets
          # No HTTP probe — the worker doesn't listen on a port. The
          # container's HEALTHCHECK still runs the file-exists check, but
          # actual queue health is reported by the API's /readyz.
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: 1, memory: 1Gi }
