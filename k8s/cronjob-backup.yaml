apiVersion: batch/v1
kind: CronJob
metadata:
  name: offis-db-backup
  namespace: offisdesign
spec:
  # Hourly. Adjust to your RPO.
  schedule: '0 * * * *'
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              # postgres:16-alpine ships pg_dump; aws-cli is installed at start.
              # Substitute your own image (e.g. one pre-baked with both binaries)
              # if pulling from the public registry on every run is unacceptable.
              image: postgres:16-alpine
              command: ['/bin/sh', '-c']
              args:
                - >
                  set -euo pipefail;
                  apk add --no-cache aws-cli >/dev/null;
                  : "${DATABASE_URL:?DATABASE_URL not set}";
                  : "${S3_BUCKET:?S3_BUCKET not set}";
                  : "${S3_REGION:?S3_REGION not set}";
                  : "${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID not set}";
                  : "${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY not set}";
                  TS=$(date -u +%Y%m%dT%H%M%SZ);
                  FILE="/tmp/db-${TS}.sql.gz";
                  KEY="${BACKUP_S3_PREFIX:-backups/db}/db-${TS}.sql.gz";
                  pg_dump --no-owner --no-privileges --format=plain "$DATABASE_URL" | gzip -9 > "$FILE";
                  echo "Dumped $(du -h "$FILE" | cut -f1) to $FILE";
                  AWS_ACCESS_KEY_ID="$S3_ACCESS_KEY_ID"
                  AWS_SECRET_ACCESS_KEY="$S3_SECRET_ACCESS_KEY"
                  aws s3 cp "$FILE" "s3://${S3_BUCKET}/${KEY}" --region "$S3_REGION" ${S3_ENDPOINT:+--endpoint-url "$S3_ENDPOINT"};
                  echo "Uploaded to s3://${S3_BUCKET}/${KEY}";
                  rm -f "$FILE"
              envFrom:
                - secretRef: { name: offis-secrets }
              volumeMounts:
                - { name: tmp, mountPath: /tmp }
          volumes:
            - name: tmp
              emptyDir: {}
