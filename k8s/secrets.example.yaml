# Template Secret manifest. Replace placeholders, then apply.
#
# Production: do NOT commit a populated copy. Use sealed-secrets, SOPS,
# external-secrets-operator, or your platform's native secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: offis-secrets
  namespace: offisdesign
type: Opaque
stringData:
  NODE_ENV: production
  APP_ENV: production
  LOG_LEVEL: info

  API_PUBLIC_URL: https://api.offisdesign.com
  WEB_PUBLIC_URL: https://offisdesign.com
  ADMIN_PUBLIC_URL: https://admin.offisdesign.com

  DATABASE_URL: postgresql://USER:PASS@HOST:5432/offisdesign?sslmode=require
  REDIS_URL: rediss://default:PASS@HOST:6380

  JWT_ACCESS_SECRET: REPLACE
  JWT_REFRESH_SECRET: REPLACE
  JWT_ACCESS_TTL_SEC: '900'
  JWT_REFRESH_TTL_SEC: '2592000'

  COOKIE_DOMAIN: .offisdesign.com
  COOKIE_SECURE: 'true'
  COOKIE_SAMESITE: lax

  STORAGE_DRIVER: s3
  S3_BUCKET: offisdesign-prod
  S3_REGION: eu-west-2
  S3_ENDPOINT: https://s3.eu-west-2.amazonaws.com
  S3_ACCESS_KEY_ID: REPLACE
  S3_SECRET_ACCESS_KEY: REPLACE

  PAYMENT_PROVIDER: stripe
  STRIPE_SECRET_KEY: REPLACE
  STRIPE_WEBHOOK_SECRET: REPLACE

  EMAIL_TRANSPORT: smtp
  EMAIL_FROM: 'Offisdesign <hello@offisdesign.com>'
  SMTP_HOST: REPLACE
  SMTP_PORT: '587'
  SMTP_USER: REPLACE
  SMTP_PASSWORD: REPLACE
