apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: offis
  namespace: offisdesign
  annotations:
    # Replace with your cluster's issuer / TLS strategy.
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Force HTTPS at the edge.
    nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
spec:
  tls:
    - hosts:
        - offisdesign.com
        - admin.offisdesign.com
        - api.offisdesign.com
      secretName: offis-tls
  rules:
    - host: offisdesign.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: offis-web, port: { number: 80 } } }
    - host: admin.offisdesign.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: offis-admin, port: { number: 80 } } }
    - host: api.offisdesign.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: offis-api, port: { number: 80 } } }
