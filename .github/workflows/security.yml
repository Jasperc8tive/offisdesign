name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches CVE feeds we missed during the week.
    - cron: '0 6 * * 1'

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin to match ci.yml so dependency-audit and CI build resolve the same
      # tree. Drifting versions across workflows can produce false positives
      # (or worse, false negatives) in `pnpm audit`.
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.3 }
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # `--prod` ignores devDependency advisories which we cannot ship.
      # `--audit-level=high` keeps the signal-to-noise high; tune via
      # `pnpm audit --json` and triage in docs/security.md.
      - run: pnpm audit --prod --audit-level=high
        continue-on-error: false

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
