name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  images:
    name: Build & push container images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target:
          - { app: api, dockerfile: docker/Dockerfile.api }
          - { app: worker, dockerfile: docker/Dockerfile.worker }
          - { app: web, dockerfile: docker/Dockerfile.web }
          - { app: admin, dockerfile: docker/Dockerfile.admin }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.target.app }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.target.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target.app }}
          cache-to: type=gha,scope=${{ matrix.target.app }},mode=max
          # Multi-arch is opt-in: enable when you actually deploy to arm64.
          platforms: linux/amd64

  preview:
    name: Preview deploy stub
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - run: |
          echo "Preview deploys are wired by the platform (Coolify webhook, Render"
          echo "preview env, fly.io app fork, …). This stub keeps the job slot so"
          echo "the integration is one PR away."
