name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Turbo cache is restored in every job that runs a turbo task so unchanged
# packages can skip work. Per-commit cache key with a prefix-only restore
# means PR runs land warm on top of main's last cache.
jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      # `--frozen-lockfile` is also the lockfile-drift gate: if pnpm-lock.yaml
      # disagrees with package.json this step fails immediately.
      - run: pnpm install --frozen-lockfile

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      # lint/typecheck go through turbo's `^build`, which builds @offisdesign/database
      # (its `tsc` imports @prisma/client). Generate the client first, as the
      # test/build jobs do, or the dependency build — and this job — fails.
      - run: pnpm --filter @offisdesign/database db:generate
      - run: pnpm format:check
      - run: pnpm lint

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      # Generate the Prisma client so the `^build` of @offisdesign/database
      # (and database's own typecheck) can resolve @prisma/client types.
      - run: pnpm --filter @offisdesign/database db:generate
      - run: pnpm typecheck

  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: offis
          POSTGRES_PASSWORD: offis
          POSTGRES_DB: offisdesign_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U offis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://offis:offis@localhost:5432/offisdesign_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-ci-access-secret-ci-access
      JWT_REFRESH_SECRET: ci-refresh-secret-ci-refresh-secret-ci-refresh
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @offisdesign/database db:generate
      - run: pnpm --filter @offisdesign/database db:migrate:deploy
      - run: pnpm --filter @offisdesign/database db:seed
      - run: pnpm test

  storybook:
    name: Storybook
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      # storybook:build bypasses turbo's `^build`, so the Tailwind preset at
      # @offisdesign/config/dist/tailwind-preset.js is never built. Build it first.
      - run: pnpm --filter @offisdesign/config build
      - run: pnpm storybook:build

  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @offisdesign/database db:generate
      - run: pnpm build

  lighthouse:
    name: Lighthouse
    needs: [build]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WEB_URL: http://localhost:3100
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @offisdesign/database db:generate
      - run: pnpm --filter @offisdesign/web build
      # `pnpm dlx` runs the CLI without polluting the lockfile or mixing
      # package managers inside the workspace. Previous npm-install pattern
      # bypassed pnpm's hoisting and could resolve to a different package.
      - name: Run Lighthouse CI
        working-directory: apps/web
        run: pnpm dlx @lhci/cli@0.14.x autorun --config=./lighthouserc.cjs
